<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Đăng Nhập – Northwind Database</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-deep:    #0a0e1a;
      --bg-card:    rgba(255,255,255,0.05);
      --border:     rgba(255,255,255,0.10);
      --accent:     #6c63ff;
      --accent2:    #a78bfa;
      --accent-glow:rgba(108,99,255,0.35);
      --text:       #e2e8f0;
      --text-muted: #94a3b8;
      --danger:     #f87171;
      --success:    #34d399;
      --input-bg:   rgba(255,255,255,0.06);
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-deep);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* ── Animated background ── */
    .bg-canvas {
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 20%, rgba(108,99,255,0.18) 0%, transparent 60%),
        radial-gradient(ellipse 60% 80% at 80% 80%, rgba(167,139,250,0.12) 0%, transparent 60%),
        linear-gradient(135deg, #0a0e1a 0%, #0f172a 50%, #0a0e1a 100%);
    }

    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.5;
      animation: drift 12s ease-in-out infinite alternate;
      z-index: 0;
    }
    .orb-1 { width: 500px; height: 500px; background: rgba(108,99,255,0.2); top: -150px; left: -100px; animation-delay: 0s; }
    .orb-2 { width: 400px; height: 400px; background: rgba(167,139,250,0.15); bottom: -100px; right: -80px; animation-delay: -4s; }
    .orb-3 { width: 300px; height: 300px; background: rgba(99,179,237,0.12); top: 50%; left: 60%; animation-delay: -8s; }

    @keyframes drift {
      0%   { transform: translate(0,0) scale(1); }
      100% { transform: translate(30px, 40px) scale(1.08); }
    }

    /* ── Grid dots ── */
    .grid-overlay {
      position: fixed; inset: 0; z-index: 0;
      background-image:
        radial-gradient(circle, rgba(255,255,255,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
    }

    /* ── Card ── */
    .card-wrap {
      position: relative; z-index: 10;
      width: 100%; max-width: 440px;
      padding: 0 20px;
      animation: slideUp 0.6s cubic-bezier(0.16,1,0.3,1) forwards;
      opacity: 0; transform: translateY(30px);
    }
    @keyframes slideUp {
      to { opacity: 1; transform: translateY(0); }
    }

    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 44px 40px 40px;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow: 0 0 0 1px rgba(255,255,255,0.04),
                  0 20px 60px rgba(0,0,0,0.5),
                  inset 0 1px 0 rgba(255,255,255,0.08);
    }

    /* ── Logo / header ── */
    .logo {
      display: flex; align-items: center; gap: 14px;
      margin-bottom: 32px;
    }
    .logo-icon {
      width: 52px; height: 52px; border-radius: 16px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
      box-shadow: 0 8px 24px var(--accent-glow);
      flex-shrink: 0;
    }
    .logo-text h1 {
      font-size: 20px; font-weight: 700; letter-spacing: -0.3px;
      background: linear-gradient(90deg, #fff 0%, var(--accent2) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .logo-text p {
      font-size: 12px; color: var(--text-muted); margin-top: 2px;
      font-weight: 400;
    }

    .card-title {
      font-size: 26px; font-weight: 700; letter-spacing: -0.5px;
      margin-bottom: 6px;
    }
    .card-subtitle {
      font-size: 14px; color: var(--text-muted);
      margin-bottom: 32px; line-height: 1.5;
    }

    /* ── Form ── */
    .field { margin-bottom: 20px; }

    label {
      display: block; font-size: 13px; font-weight: 500;
      color: var(--text-muted); margin-bottom: 8px;
      letter-spacing: 0.3px;
    }

    .input-wrap {
      position: relative;
    }
    .input-icon {
      position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
      font-size: 16px; opacity: 0.5; pointer-events: none;
    }

    input[type="text"], input[type="password"] {
      width: 100%;
      padding: 13px 14px 13px 42px;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-size: 15px;
      font-family: 'Inter', sans-serif;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
      outline: none;
    }
    input[type="text"]:focus, input[type="password"]:focus {
      border-color: var(--accent);
      background: rgba(108,99,255,0.08);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }
    input::placeholder { color: rgba(148,163,184,0.5); }

    .toggle-pw {
      position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
      cursor: pointer; font-size: 16px; opacity: 0.4;
      transition: opacity 0.2s; user-select: none;
    }
    .toggle-pw:hover { opacity: 0.8; }

    /* ── Error alert ── */
    .alert {
      display: none;
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 13.5px;
      margin-bottom: 20px;
      font-weight: 500;
      animation: shake 0.4s ease;
    }
    .alert.error   { background: rgba(248,113,113,0.12); border: 1px solid rgba(248,113,113,0.3); color: var(--danger); }
    .alert.success { background: rgba(52,211,153,0.12);  border: 1px solid rgba(52,211,153,0.3);  color: var(--success); }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%,60% { transform: translateX(-6px); }
      40%,80% { transform: translateX(6px); }
    }

    /* ── Button ── */
    .btn-login {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--accent) 0%, #8b5cf6 100%);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      letter-spacing: 0.2px;
      position: relative;
      overflow: hidden;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 4px 20px var(--accent-glow);
    }
    .btn-login:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 8px 30px var(--accent-glow);
    }
    .btn-login:active:not(:disabled) { transform: translateY(0); }
    .btn-login:disabled { opacity: 0.65; cursor: not-allowed; }

    .btn-login .ripple {
      position: absolute; border-radius: 50%;
      background: rgba(255,255,255,0.25);
      transform: scale(0); animation: ripple 0.5s linear;
      pointer-events: none;
    }
    @keyframes ripple {
      to { transform: scale(4); opacity: 0; }
    }

    .spinner {
      display: inline-block; width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-right: 8px; vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Footer ── */
    .card-footer {
      margin-top: 28px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center; gap: 8px;
      font-size: 12px; color: var(--text-muted);
    }
    .badge {
      display: inline-flex; align-items: center; gap: 5px;
      background: rgba(52,211,153,0.1); border: 1px solid rgba(52,211,153,0.25);
      color: var(--success); border-radius: 20px;
      padding: 3px 10px; font-size: 11px; font-weight: 500;
    }
    .badge::before { content: '●'; font-size: 8px; }
  </style>
</head>
<body>

<div class="bg-canvas"></div>
<div class="grid-overlay"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<div class="card-wrap">
  <div class="card">
    <div class="logo">
      <div class="logo-icon">🧭</div>
      <div class="logo-text">
        <h1>Northwind DB</h1>
        <p>Business Intelligence Portal</p>
      </div>
    </div>

    <!-- Step 1: Mật khẩu -->
    <div id="step-login">
      <div class="card-title">Chào mừng trở lại</div>
      <div class="card-subtitle">Đăng nhập để truy cập dữ liệu doanh nghiệp</div>
      <div class="alert error" id="alert-login"></div>
      <form id="login-form" autocomplete="off">
        <div class="field">
          <label for="username">Tên đăng nhập</label>
          <div class="input-wrap">
            <span class="input-icon">👤</span>
            <input type="text" id="username" placeholder="Nhập tên đăng nhập" autocomplete="username" required />
          </div>
        </div>
        <div class="field">
          <label for="password">Mật khẩu</label>
          <div class="input-wrap">
            <span class="input-icon">🔑</span>
            <input type="password" id="password" placeholder="Nhập mật khẩu" autocomplete="current-password" required />
            <span class="toggle-pw" id="toggle-pw">👁️</span>
          </div>
        </div>
        <button type="submit" class="btn-login" id="btn-login">Đăng Nhập</button>
      </form>
    </div>

    <!-- Step 2: OTP -->
    <div id="step-otp" style="display:none">
      <div style="text-align:center;margin-bottom:24px">
        <div style="font-size:48px;margin-bottom:12px">📧</div>
        <div class="card-title" style="font-size:22px">Xác Thực 2 Bước</div>
        <div class="card-subtitle" id="otp-hint">Mã OTP đã được gửi đến email của bạn</div>
      </div>
      <div class="alert error" id="alert-otp"></div>
      <div class="alert" id="alert-dev" style="background:rgba(251,191,36,0.1);border:1px solid rgba(251,191,36,0.3);color:#fbbf24;display:none"></div>
      <form id="otp-form">
        <div class="field">
          <label>Mã OTP (6 chữ số)</label>
          <div class="input-wrap">
            <span class="input-icon">🔐</span>
            <input type="text" id="otp-input" placeholder="_ _ _ _ _ _"
              maxlength="6" inputmode="numeric" autocomplete="one-time-code"
              style="letter-spacing:10px;font-size:22px;text-align:center;padding-left:14px" required />
          </div>
        </div>
        <button type="submit" class="btn-login" id="btn-otp">Xác Nhận OTP</button>
      </form>
      <div style="text-align:center;margin-top:16px;font-size:13px;color:var(--text-muted)">
        <span id="countdown"></span>
        <a href="#" id="resend-otp" style="color:var(--accent2);text-decoration:none;display:none"> Gửi lại OTP</a>
        <br/>
        <a href="#" onclick="goBack();return false" style="color:var(--text-muted);margin-top:8px;display:inline-block;text-decoration:none">← Quay lại</a>
      </div>
    </div>

    <div class="card-footer">
      <span class="badge">Bảo mật</span>
      <span>Xác thực 2 bước bật</span>
    </div>
  </div>
</div>

<script>
let currentUsername = '';
let countdownTimer = null;

// Toggle password
document.getElementById('toggle-pw').addEventListener('click', () => {
  const pw = document.getElementById('password');
  const tog = document.getElementById('toggle-pw');
  pw.type = pw.type === 'password' ? 'text' : 'password';
  tog.textContent = pw.type === 'password' ? '👁️' : '🙈';
});

// Ripple
document.querySelectorAll('.btn-login').forEach(btn => {
  btn.addEventListener('mousedown', function(e) {
    const rect = btn.getBoundingClientRect();
    const size = Math.max(rect.width, rect.height);
    const rip = document.createElement('span');
    rip.className = 'ripple';
    Object.assign(rip.style, { width:size+'px', height:size+'px',
      left:(e.clientX-rect.left-size/2)+'px', top:(e.clientY-rect.top-size/2)+'px' });
    btn.appendChild(rip);
    rip.addEventListener('animationend', () => rip.remove());
  });
});

function showAlert(id, msg, type='error') {
  const el = document.getElementById(id);
  el.textContent = (type==='error'?'⚠️ ':'ℹ️ ') + msg;
  el.className = 'alert ' + type;
  el.style.display = 'block';
}
function hideAlert(id) { document.getElementById(id).style.display='none'; }

function goBack() {
  clearInterval(countdownTimer);
  document.getElementById('step-otp').style.display = 'none';
  document.getElementById('step-login').style.display = 'block';
  document.getElementById('password').value = '';
  hideAlert('alert-login'); hideAlert('alert-otp'); hideAlert('alert-dev');
  document.getElementById('btn-login').disabled = false;
  document.getElementById('btn-login').innerHTML = 'Đăng Nhập';
}

function startCountdown(seconds) {
  let s = seconds;
  const countEl = document.getElementById('countdown');
  const resendEl = document.getElementById('resend-otp');
  resendEl.style.display = 'none';
  clearInterval(countdownTimer);
  countdownTimer = setInterval(() => {
    s--;
    countEl.textContent = `Mã hết hạn sau ${s}s`;
    if (s <= 0) {
      clearInterval(countdownTimer);
      countEl.textContent = 'Mã đã hết hạn.';
      resendEl.style.display = 'inline';
    }
  }, 1000);
}

// Step 1 – Submit login
document.getElementById('login-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('btn-login');
  currentUsername = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  hideAlert('alert-login');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Đang xác thực…';
  try {
    const res = await fetch('/auth/login', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ username: currentUsername, password })
    });
    const data = await res.json();
    if (data.success && data.redirect) {
      window.location.href = data.redirect;
      return;
    }
    if (data.success && data.step === 'otp') {
      document.getElementById('step-login').style.display = 'none';
      document.getElementById('step-otp').style.display = 'block';
      document.getElementById('otp-hint').textContent = `Kiểm tra mail để nhận mã OTP`;
      if (data.devMode) {
        document.getElementById('alert-dev').textContent = '⚠️ [DEV MODE] Email chưa cấu hình – kiểm tra OTP trong console của server';
        document.getElementById('alert-dev').style.display = 'block';
      }
      document.getElementById('otp-input').value = '';
      document.getElementById('otp-input').focus();
      startCountdown(300);
    } else {
      showAlert('alert-login', data.message || 'Lỗi đăng nhập');
      btn.disabled = false;
      btn.innerHTML = 'Đăng Nhập';
      document.getElementById('password').value = '';
    }
  } catch { showAlert('alert-login', 'Không thể kết nối máy chủ'); btn.disabled=false; btn.innerHTML='Đăng Nhập'; }
});

// Step 2 – Submit OTP
document.getElementById('otp-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('btn-otp');
  const otp = document.getElementById('otp-input').value.trim();
  hideAlert('alert-otp');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Xác nhận…';
  try {
    const res = await fetch('/auth/verify-otp', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ username: currentUsername, otp })
    });
    const data = await res.json();
    if (data.success) {
      btn.innerHTML = '✅ Thành công!';
      clearInterval(countdownTimer);
      setTimeout(() => window.location.href = data.redirect, 600);
    } else {
      showAlert('alert-otp', data.message || 'Mã OTP không đúng');
      btn.disabled = false;
      btn.innerHTML = 'Xác Nhận OTP';
      document.getElementById('otp-input').value = '';
      document.getElementById('otp-input').focus();
    }
  } catch { showAlert('alert-otp', 'Lỗi kết nối'); btn.disabled=false; btn.innerHTML='Xác Nhận OTP'; }
});

// Resend OTP
document.getElementById('resend-otp').addEventListener('click', async (e) => {
  e.preventDefault();
  const resendEl = document.getElementById('resend-otp');
  resendEl.style.display = 'none';
  hideAlert('alert-otp'); hideAlert('alert-dev');
  document.getElementById('countdown').textContent = 'Đang gửi lại…';
  try {
    const res = await fetch('/auth/resend-otp', { method: 'POST', headers: { 'Content-Type': 'application/json' } });
    const data = await res.json();
    if (data.success) {
      document.getElementById('otp-hint').textContent = `Kiểm tra mail để nhận mã OTP mới`;
      if (data.devMode) {
        document.getElementById('alert-dev').textContent = '⚠️ [DEV MODE] OTP mới đã in ra console server';
        document.getElementById('alert-dev').style.display = 'block';
      }
      document.getElementById('otp-input').value = '';
      document.getElementById('otp-input').focus();
      startCountdown(300);
    } else {
      showAlert('alert-otp', data.message || 'Không thể gửi lại OTP');
      resendEl.style.display = 'inline';
      document.getElementById('countdown').textContent = '';
    }
  } catch {
    showAlert('alert-otp', 'Lỗi kết nối, thử lại sau');
    resendEl.style.display = 'inline';
    document.getElementById('countdown').textContent = '';
  }
});
</script>
</body>
</html>
