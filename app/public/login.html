<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Northwind Sign In</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --panel: #ffffff;
      --text: #172033;
      --muted: #667085;
      --line: #d9e0ea;
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --danger: #b42318;
      --danger-bg: #fff2f0;
      --success: #027a48;
      --success-bg: #ecfdf3;
      --shadow: 0 20px 60px rgba(20, 31, 56, 0.14);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        linear-gradient(135deg, rgba(37, 99, 235, 0.08), transparent 38%),
        linear-gradient(315deg, rgba(20, 184, 166, 0.08), transparent 36%),
        var(--bg);
      display: grid;
      place-items: center;
      padding: 32px;
    }

    .login-shell {
      width: min(100%, 980px);
      min-height: 560px;
      display: grid;
      grid-template-columns: 1fr 420px;
      background: var(--panel);
      border: 1px solid rgba(217, 224, 234, 0.9);
      border-radius: 8px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .brand-panel {
      padding: 48px;
      background:
        linear-gradient(rgba(15, 23, 42, 0.78), rgba(15, 23, 42, 0.78)),
        url("https://images.unsplash.com/photo-1554224155-6726b3ff858f?auto=format&fit=crop&w=1200&q=80") center/cover;
      color: white;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .brand-mark {
      width: 44px;
      height: 44px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      background: rgba(255, 255, 255, 0.14);
      border: 1px solid rgba(255, 255, 255, 0.2);
      font-weight: 800;
      letter-spacing: 0;
    }

    .brand-copy h1 {
      margin: 0 0 14px;
      max-width: 520px;
      font-size: 40px;
      line-height: 1.08;
      letter-spacing: 0;
    }

    .brand-copy p {
      margin: 0;
      max-width: 500px;
      color: rgba(255, 255, 255, 0.78);
      font-size: 15px;
      line-height: 1.7;
    }

    .form-panel {
      padding: 44px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .form-panel h2 {
      margin: 0;
      font-size: 26px;
      letter-spacing: 0;
    }

    .form-panel .sub {
      margin: 8px 0 28px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }

    .field { margin-bottom: 16px; }

    label {
      display: block;
      margin-bottom: 7px;
      color: #344054;
      font-size: 13px;
      font-weight: 650;
    }

    .input-wrap { position: relative; }

    input {
      width: 100%;
      height: 44px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0 12px;
      font: inherit;
      color: var(--text);
      background: #fff;
      outline: none;
    }

    input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.14);
    }

    .toggle-password {
      position: absolute;
      right: 8px;
      top: 7px;
      height: 30px;
      padding: 0 9px;
      border: 0;
      border-radius: 6px;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      font-weight: 650;
    }

    .alert {
      display: none;
      padding: 11px 12px;
      border-radius: 8px;
      margin-bottom: 16px;
      font-size: 13px;
      line-height: 1.45;
    }

    .alert.error {
      display: block;
      color: var(--danger);
      background: var(--danger-bg);
      border: 1px solid #fecdca;
    }

    .alert.success {
      display: block;
      color: var(--success);
      background: var(--success-bg);
      border: 1px solid #abefc6;
    }

    .primary-btn {
      width: 100%;
      height: 44px;
      border: 0;
      border-radius: 8px;
      background: var(--primary);
      color: white;
      font: inherit;
      font-weight: 750;
      cursor: pointer;
      margin-top: 4px;
    }

    .primary-btn:hover { background: var(--primary-dark); }
    .primary-btn:disabled { opacity: 0.68; cursor: not-allowed; }

    .otp-panel { display: none; }
    .otp-panel.active { display: block; }
    .login-panel.hidden { display: none; }

    .small-link {
      border: 0;
      background: transparent;
      color: var(--primary);
      cursor: pointer;
      padding: 0;
      font: inherit;
      font-size: 13px;
      font-weight: 650;
      margin-top: 14px;
    }

    @media (max-width: 860px) {
      .login-shell { grid-template-columns: 1fr; }
      .brand-panel { min-height: 260px; }
      .brand-copy h1 { font-size: 32px; }
    }
  </style>
</head>
<body>
  <main class="login-shell">
    <section class="brand-panel">
      <div class="brand-mark">NW</div>
      <div class="brand-copy">
        <h1>Northwind Sales Management</h1>
        <p>Secure access for sales operations, order tracking, product verification, user management, and audit review.</p>
      </div>
    </section>

    <section class="form-panel">
      <div id="login-panel" class="login-panel">
        <h2>Sign in</h2>
        <p class="sub">Use your assigned account to continue.</p>
        <div id="login-alert" class="alert"></div>
        <form id="login-form" autocomplete="off">
          <div class="field">
            <label for="username">Username</label>
            <input id="username" name="username" type="text" autocomplete="username" required />
          </div>
          <div class="field">
            <label for="password">Password</label>
            <div class="input-wrap">
              <input id="password" name="password" type="password" autocomplete="current-password" required />
              <button type="button" class="toggle-password" id="toggle-password">Show</button>
            </div>
          </div>
          <button class="primary-btn" id="login-button" type="submit">Login</button>
        </form>
      </div>

      <div id="otp-panel" class="otp-panel">
        <h2>Verify login</h2>
        <p class="sub">Enter the 6 digit code sent to the administrator email.</p>
        <div id="otp-alert" class="alert"></div>
        <form id="otp-form">
          <div class="field">
            <label for="otp-input">OTP code</label>
            <input id="otp-input" type="text" maxlength="6" inputmode="numeric" autocomplete="one-time-code" />
          </div>
          <button class="primary-btn" id="otp-button" type="submit">Verify</button>
        </form>
        <button class="small-link" id="resend-otp" type="button">Resend OTP</button><br />
        <button class="small-link" id="back-login" type="button">Back to login</button>
      </div>
    </section>
  </main>

  <script>
    let currentUsername = "";

    const loginPanel = document.getElementById("login-panel");
    const otpPanel = document.getElementById("otp-panel");
    const loginAlert = document.getElementById("login-alert");
    const otpAlert = document.getElementById("otp-alert");

    function setAlert(el, message, type = "error") {
      el.textContent = message;
      el.className = `alert ${type}`;
    }

    function clearAlert(el) {
      el.textContent = "";
      el.className = "alert";
    }

    function setBusy(button, busy, label) {
      button.disabled = busy;
      button.textContent = busy ? "Please wait..." : label;
    }

    document.getElementById("toggle-password").addEventListener("click", () => {
      const password = document.getElementById("password");
      const showing = password.type === "text";
      password.type = showing ? "password" : "text";
      document.getElementById("toggle-password").textContent = showing ? "Show" : "Hide";
    });

    document.getElementById("login-form").addEventListener("submit", async (event) => {
      event.preventDefault();
      clearAlert(loginAlert);
      const button = document.getElementById("login-button");
      currentUsername = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value;

      setBusy(button, true, "Login");
      try {
        const response = await fetch("/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username: currentUsername, password })
        });
        const data = await response.json();
        if (data.success && data.redirect) {
          window.location.href = data.redirect;
          return;
        }
        if (data.success && data.step === "otp") {
          loginPanel.classList.add("hidden");
          otpPanel.classList.add("active");
          document.getElementById("otp-input").focus();
          if (data.devMode) setAlert(otpAlert, "Development mode: check the server console for the OTP.", "success");
          return;
        }
        setAlert(loginAlert, data.message || "The username or password is incorrect.");
      } catch {
        setAlert(loginAlert, "Unable to connect. Please try again in a moment.");
      } finally {
        setBusy(button, false, "Login");
      }
    });

    document.getElementById("otp-form").addEventListener("submit", async (event) => {
      event.preventDefault();
      clearAlert(otpAlert);
      const button = document.getElementById("otp-button");
      setBusy(button, true, "Verify");
      try {
        const response = await fetch("/auth/verify-otp", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username: currentUsername, otp: document.getElementById("otp-input").value.trim() })
        });
        const data = await response.json();
        if (data.success) window.location.href = data.redirect;
        else setAlert(otpAlert, data.message || "Invalid OTP code.");
      } catch {
        setAlert(otpAlert, "Unable to verify the OTP right now.");
      } finally {
        setBusy(button, false, "Verify");
      }
    });

    document.getElementById("resend-otp").addEventListener("click", async () => {
      clearAlert(otpAlert);
      const response = await fetch("/auth/resend-otp", { method: "POST" });
      const data = await response.json();
      setAlert(otpAlert, data.success ? "A new OTP has been sent." : (data.message || "Unable to resend OTP."), data.success ? "success" : "error");
    });

    document.getElementById("back-login").addEventListener("click", () => {
      otpPanel.classList.remove("active");
      loginPanel.classList.remove("hidden");
      clearAlert(otpAlert);
    });
  </script>
</body>
</html>
